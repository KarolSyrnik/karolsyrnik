<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OLM zu MBOX Converter</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f10;
      color: #f4f4f5;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(920px, 100%);
      background: #171719;
      border: 1px solid #2b2b30;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 22px; color: #b9b9c0; line-height: 1.5; }
    .drop {
      border: 2px dashed #555762;
      border-radius: 16px;
      padding: 34px;
      text-align: center;
      background: #111113;
      cursor: pointer;
      transition: .15s ease;
    }
    .drop.drag { border-color: #9dbbff; background: #161b2a; }
    .drop strong { display: block; font-size: 18px; margin-bottom: 8px; }
    input[type=file] { display: none; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 13px 18px;
      font-weight: 700;
      cursor: pointer;
      background: #cfe0ff;
      color: #0b1020;
    }
    button.secondary { background: #2b2b30; color: #f4f4f5; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    label.check { display: flex; align-items: center; gap: 10px; margin-top: 16px; color: #d9d9de; }
    progress { width: 100%; height: 16px; margin-top: 18px; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b0b0c;
      border: 1px solid #2b2b30;
      border-radius: 14px;
      padding: 16px;
      min-height: 120px;
      margin: 18px 0 0;
      color: #d7d7dd;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>OLM zu MBOX Converter</h1>
    <p>Lokaler Browser-Converter. Die Datei bleibt auf deinem Gerät.</p>

    <div id="drop" class="drop">
      <strong>OLM-Datei hier ablegen</strong>
      <span>oder klicken und Datei auswählen</span>
      <input id="file" type="file" accept=".olm,.txt,.eml,.mbox">
    </div>

    <label class="check">
      <input id="plainText" type="checkbox" checked>
      HTML in lesbaren Text umwandeln
    </label>

    <div class="row">
      <button id="convert" disabled>In MBOX konvertieren</button>
      <button id="clear" class="secondary" disabled>Zurücksetzen</button>
    </div>

    <progress id="progress" value="0" max="100"></progress>
    <pre id="log">Bereit.</pre>
  </main>

  <script>
    const fileInput = document.getElementById("file");
    const drop = document.getElementById("drop");
    const convertBtn = document.getElementById("convert");
    const clearBtn = document.getElementById("clear");
    const progress = document.getElementById("progress");
    const logBox = document.getElementById("log");
    const plainTextBox = document.getElementById("plainText");

    let selectedFile = null;

    drop.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      selectedFile = fileInput.files[0] || null;
      refreshState();
    });

    drop.addEventListener("dragover", event => {
      event.preventDefault();
      drop.classList.add("drag");
    });

    drop.addEventListener("dragleave", () => drop.classList.remove("drag"));

    drop.addEventListener("drop", event => {
      event.preventDefault();
      drop.classList.remove("drag");
      selectedFile = event.dataTransfer.files[0] || null;
      refreshState();
    });

    clearBtn.addEventListener("click", () => {
      selectedFile = null;
      fileInput.value = "";
      progress.value = 0;
      log("Bereit.");
      refreshState();
    });

    convertBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      try {
        progress.value = 5;
        log("Lese Datei: " + selectedFile.name);

        const buffer = await selectedFile.arrayBuffer();
        progress.value = 25;

        const text = decodeBuffer(buffer);
        progress.value = 45;

        const mails = extractEmails(text);
        progress.value = 75;

        if (!mails.length) {
          log("Keine verwertbaren Nachrichten gefunden. Diese OLM-Datei ist vermutlich stark binär oder komprimiert.");
          progress.value = 0;
          return;
        }

        const mbox = mails.map(mail => buildMboxMessage(mail, plainTextBox.checked)).join("\n");
        const outName = cleanName(selectedFile.name).replace(/\.[^.]+$/, "") + ".mbox";

        downloadFile(outName, mbox);
        progress.value = 100;
        log("Fertig. Exportiert: " + mails.length + " Nachrichten\nDatei: " + outName);
      } catch (error) {
        progress.value = 0;
        log("Fehler: " + error.message);
      }
    });

    function refreshState() {
      convertBtn.disabled = !selectedFile;
      clearBtn.disabled = !selectedFile;
      if (selectedFile) {
        log("Ausgewählt: " + selectedFile.name + "\nGröße: " + formatBytes(selectedFile.size));
      }
    }

    function log(message) {
      logBox.textContent = message;
    }

    function decodeBuffer(buffer) {
      const bytes = new Uint8Array(buffer);
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      const windows = new TextDecoder("windows-1252", { fatal: false }).decode(bytes);
      const utf8Score = scoreText(utf8);
      const winScore = scoreText(windows);
      return winScore > utf8Score ? windows : utf8;
    }

    function scoreText(text) {
      let score = 0;
      score += (text.match(/Subject:/gi) || []).length * 4;
      score += (text.match(/From:/gi) || []).length * 3;
      score += (text.match(/To:/gi) || []).length * 3;
      score -= (text.match(/�/g) || []).length * 5;
      score -= (text.match(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g) || []).length;
      return score;
    }

    function extractEmails(text) {
      text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      text = text.replace(/\u0000/g, "");

      const candidates = [];
      const startRegex = /(^|\n)(Return-Path:|Delivered-To:|From:|Message-ID:|Date:|Subject:)\s/gi;
      const starts = [];
      let match;

      while ((match = startRegex.exec(text)) !== null) {
        starts.push(match.index + (match[1] ? 1 : 0));
      }

      starts.push(text.length);

      for (let i = 0; i < starts.length - 1; i++) {
        const part = text.slice(starts[i], starts[i + 1]).trim();
        if (looksLikeMail(part)) candidates.push(normalizeRawMail(part));
      }

      const merged = mergeFragments(candidates);
      const unique = [];
      const seen = new Set();

      for (const mail of merged) {
        const key = fingerprint(mail);
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(mail);
        }
      }

      return unique;
    }

    function looksLikeMail(text) {
      if (text.length < 80) return false;
      let hits = 0;
      if (/^From:\s.+/im.test(text)) hits++;
      if (/^To:\s.+/im.test(text)) hits++;
      if (/^Subject:\s.*$/im.test(text)) hits++;
      if (/^Date:\s.+/im.test(text)) hits++;
      if (/^Message-ID:\s.+/im.test(text)) hits++;
      return hits >= 2;
    }

    function normalizeRawMail(text) {
      return text
        .replace(/[\u0001-\u0008\u000B\u000C\u000E-\u001F]/g, "")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{4,}/g, "\n\n")
        .trim();
    }

    function mergeFragments(items) {
      const output = [];
      for (const item of items) {
        if (!output.length) {
          output.push(item);
          continue;
        }
        const prev = output[output.length - 1];
        const prevHasBody = /\n\n/.test(prev);
        const itemIsHeaderOnly = !/\n\n/.test(item) && item.length < 2000;
        if (!prevHasBody && itemIsHeaderOnly) {
          output[output.length - 1] = prev + "\n" + item;
        } else {
          output.push(item);
        }
      }
      return output;
    }

    function buildMboxMessage(raw, plainText) {
      raw = raw.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

      const parsed = splitHeadersBody(raw);
      let headers = fixHeaders(parsed.headers);
      let body = parsed.body;

      const transferEncoding = headerValue(headers, "Content-Transfer-Encoding").toLowerCase();
      const contentType = headerValue(headers, "Content-Type").toLowerCase();

      if (transferEncoding.includes("quoted-printable")) body = decodeQuotedPrintable(body);
      if (transferEncoding.includes("base64")) body = decodeBase64Body(body);
      body = decodeHtmlEntities(body);

      if (plainText && contentType.includes("html")) body = htmlToText(body);
      if (plainText && /<html|<body|<div|<span|<p|<br/i.test(body)) body = htmlToText(body);

      body = body
        .replace(/^From /gm, ">From ")
        .replace(/\n{4,}/g, "\n\n")
        .trim();

      if (!/^MIME-Version:/im.test(headers)) headers += "\nMIME-Version: 1.0";
      if (!/^Content-Type:/im.test(headers)) headers += "\nContent-Type: text/plain; charset=UTF-8";
      if (!/^Content-Transfer-Encoding:/im.test(headers)) headers += "\nContent-Transfer-Encoding: 8bit";

      const date = parseDate(headerValue(headers, "Date"));

      return "From olm-converter " + date + "\n" + headers.trim() + "\n\n" + body + "\n";
    }

    function splitHeadersBody(raw) {
      const split = raw.search(/\n\s*\n/);
      if (split !== -1) {
        return {
          headers: raw.slice(0, split).trim(),
          body: raw.slice(split).trim()
        };
      }

      const lines = raw.split("\n");
      const headers = [];
      const body = [];
      let inHeaders = true;

      for (const line of lines) {
        if (inHeaders && (/^[A-Za-z0-9-]+:\s/.test(line) || /^[ \t]/.test(line))) {
          headers.push(line);
        } else {
          inHeaders = false;
          body.push(line);
        }
      }

      return { headers: headers.join("\n").trim(), body: body.join("\n").trim() };
    }

    function fixHeaders(headers) {
      const allowed = [
        "Return-Path", "Delivered-To", "From", "To", "Cc", "Bcc", "Subject", "Date",
        "Message-ID", "References", "In-Reply-To", "MIME-Version", "Content-Type",
        "Content-Transfer-Encoding", "Thread-Topic", "Thread-Index", "Reply-To",
        "Sender", "Importance", "X-MS-Has-Attach"
      ];

      const lines = headers.split("\n");
      const output = [];
      let lastKept = false;

      for (let line of lines) {
        line = line.replace(/\s+$/g, "");
        const name = (line.match(/^([A-Za-z0-9-]+):/) || [])[1];
        if (name && allowed.some(x => x.toLowerCase() === name.toLowerCase())) {
          output.push(line);
          lastKept = true;
        } else if (/^[ \t]/.test(line) && lastKept) {
          output.push(line);
        } else {
          lastKept = false;
        }
      }

      if (!output.some(line => /^Date:/i.test(line))) output.push("Date: " + new Date().toUTCString());
      if (!output.some(line => /^From:/i.test(line))) output.push("From: unknown@local");
      if (!output.some(line => /^Subject:/i.test(line))) output.push("Subject: Ohne Betreff");

      return output.join("\n");
    }

    function headerValue(headers, name) {
      const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp("^" + escaped + ":\\s*([\\s\\S]*?)(?=\\n[A-Za-z0-9-]+:|$)", "im");
      const match = headers.match(regex);
      return match ? match[1].replace(/\n[ \t]+/g, " ").trim() : "";
    }

    function parseDate(value) {
      const d = value ? new Date(value) : new Date();
      return isNaN(d.getTime()) ? new Date().toUTCString() : d.toUTCString();
    }

    function decodeQuotedPrintable(text) {
      return text
        .replace(/=\n/g, "")
        .replace(/=([A-Fa-f0-9]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
    }

    function decodeBase64Body(text) {
      const compact = text.replace(/[^A-Za-z0-9+/=]/g, "");
      if (compact.length < 16) return text;
      try {
        const binary = atob(compact);
        const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
        return new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      } catch {
        return text;
      }
    }

    function decodeHtmlEntities(text) {
      const area = document.createElement("textarea");
      area.innerHTML = text;
      return area.value;
    }

    function htmlToText(html) {
      html = html
        .replace(/<style[\s\S]*?<\/style>/gi, "")
        .replace(/<script[\s\S]*?<\/script>/gi, "")
        .replace(/<br\s*\/?\s*>/gi, "\n")
        .replace(/<\/p>/gi, "\n")
        .replace(/<\/div>/gi, "\n")
        .replace(/<\/li>/gi, "\n")
        .replace(/<li[^>]*>/gi, "- ")
        .replace(/<[^>]+>/g, "")
        .replace(/[ \t]{2,}/g, " ")
        .replace(/\n[ \t]+/g, "\n")
        .replace(/\n{3,}/g, "\n\n");
      return decodeHtmlEntities(html).trim();
    }

    function fingerprint(text) {
      const id = (text.match(/^Message-ID:\s*(.+)$/im) || [])[1];
      if (id) return "id:" + id.trim();
      const subject = (text.match(/^Subject:\s*(.*)$/im) || [])[1] || "";
      const date = (text.match(/^Date:\s*(.*)$/im) || [])[1] || "";
      const from = (text.match(/^From:\s*(.*)$/im) || [])[1] || "";
      return (from + "|" + subject + "|" + date + "|" + text.length).slice(0, 500);
    }

    function cleanName(name) {
      return name.replace(/[\\/:*?"<>|]+/g, "-");
    }

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let index = 0;
      while (size >= 1024 && index < units.length - 1) {
        size /= 1024;
        index++;
      }
      return size.toFixed(index ? 2 : 0) + " " + units[index];
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: "application/mbox;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
