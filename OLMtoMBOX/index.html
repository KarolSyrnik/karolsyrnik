<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>OLM zu MBOX Converter</title>
</head>
<body>
  <h1>OLM zu MBOX Converter</h1>

  <input type="file" id="file" accept=".olm">
  <button onclick="convert()">Konvertieren</button>

  <pre id="log"></pre>

  <script>
    async function convert() {
      const input = document.getElementById("file");
      const log = document.getElementById("log");

      if (!input.files.length) {
        log.textContent = "Bitte eine .olm Datei auswählen.";
        return;
      }

      log.textContent = "Datei wird gelesen...";

      const file = input.files[0];
      const buffer = await file.arrayBuffer();
      const text = new TextDecoder("utf-8", { fatal: false }).decode(buffer);

      log.textContent = "Suche nach E-Mail-Inhalten...";

      const messages = extractMessages(text);

      if (!messages.length) {
        log.textContent = "Keine E-Mail-Inhalte gefunden. Diese OLM-Datei nutzt vermutlich ein binäres Format.";
        return;
      }

      const mbox = messages.map(toMboxMessage).join("\n");
      download("converted.mbox", mbox);

      log.textContent = messages.length + " Nachrichten exportiert.";
    }

    function extractMessages(text) {
      const messages = [];

      const regex = /(From: .*?)(?=\nFrom: |\nReturn-Path: |\nDelivered-To: |\n[A-Z][A-Za-z-]+: |$)/gs;
      let match;

      while ((match = regex.exec(text)) !== null) {
        const msg = match[1].trim();

        if (
          msg.includes("Subject:") ||
          msg.includes("Date:") ||
          msg.includes("To:")
        ) {
          messages.push(msg);
        }
      }

      if (!messages.length && text.includes("Subject:")) {
        messages.push(text.trim());
      }

      return messages;
    }

    function toMboxMessage(raw) {
      const dateMatch = raw.match(/^Date:\s*(.*)$/im);
      const date = dateMatch ? new Date(dateMatch[1]) : new Date();

      const safeDate = isNaN(date.getTime())
        ? new Date().toUTCString()
        : date.toUTCString();

      return "From olm-converter " + safeDate + "\n" + raw + "\n";
    }

    function download(filename, content) {
      const blob = new Blob([content], { type: "application/mbox" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();

      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
